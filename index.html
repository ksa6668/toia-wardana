<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ايقونة التطبيق (مطابقة شعار شاشة الدخول) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Batch 21+37: theme-color = لون التطبيق الموحّد، يطبّق على status bar في iPhone -->
    <!-- Batch 37: black-translucent يجعل الـ status bar شفافاً ليأخذ لون التدرج تحته
         (يندمج مع شاشة الدخول والشاشات الأخرى بصرياً). -->
    <meta name="theme-color" content="#DCEBFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Toia & Wardana" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Toia &amp; Wardana</title>

    <!-- خلفية html/body بنفس لون التطبيق — يضمن منطقة safe-area فوق الهيدر بنفس اللون -->
    <style>
      html, body {
        background: #F2F6FC !important;
        margin: 0;
        padding: 0;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
