<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#082765" />
      <stop offset="60%" stop-color="#061742" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#28DFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#28DFFF" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- خلفية بزوايا مدوّرة (rounded square) -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)" />
  <rect width="100" height="100" rx="22" ry="22" fill="url(#shine)" />
  <!-- 4 بتلات + المركز -->
  <ellipse cx="50" cy="28" rx="14" ry="22" fill="white" opacity="0.92" />
  <ellipse cx="50" cy="72" rx="14" ry="22" fill="white" opacity="0.92" />
  <ellipse cx="28" cy="50" rx="22" ry="14" fill="#28DFFF" opacity="0.85" />
  <ellipse cx="72" cy="50" rx="22" ry="14" fill="#168BFF" opacity="0.85" />
  <circle cx="50" cy="50" r="6" fill="white" />
</svg>
